services:
  - type: web
    name: portfolio-contact-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npx tsx server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
